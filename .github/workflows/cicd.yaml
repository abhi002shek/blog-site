name: CICD Pipeline

on:
  push:
    branches: ["main"]

env:
  FRONTEND_IMAGE_NAME: blog-site-frontend
  BACKEND_IMAGE_NAME: blog-site-backend

jobs:

# -------------------------------------------------
# 1. SECURITY SCAN (SOURCE CODE)
# -------------------------------------------------
  security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
          sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan repository for vulnerabilities
        run: trivy fs --format json -o fs-report.json .

      - name: Install Gitleaks
        run: sudo apt install -y gitleaks

      - name: Scan repository for secrets
        run: gitleaks detect --source . -v


# -------------------------------------------------
# 2. CODE QUALITY CHECK (SONARQUBE)
# -------------------------------------------------
  build_project_and_sonar:
    runs-on: ubuntu-latest
    needs: security-check

    steps:
      - uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: Check Sonar Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}


# -------------------------------------------------
# 3. DETECT CHANGED SERVICES
# -------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    needs: security-check

    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed folders
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'server/**'


# -------------------------------------------------
# 4. FRONTEND BUILD + SECURITY + PUSH
# -------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    needs: [changes, build_project_and_sonar]
    if: needs.changes.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: tag
        run: echo "tag=v1-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan container image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          format: spdx-json
          output-file: sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: frontend-sbom
          path: sbom.json


# -------------------------------------------------
# 5. BACKEND BUILD + SECURITY + PUSH
# -------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    needs: [changes, build_project_and_sonar]
    if: needs.changes.outputs.backend == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: tag
        run: echo "tag=v1-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan container image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          severity: CRITICAL,HIGH
          exit-code: 1


# -------------------------------------------------
# 6. UPDATE KUBERNETES MANIFESTS (GITOPS)
# -------------------------------------------------
  update-manifests:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: always() && (needs.frontend.result == 'success' || needs.backend.result == 'success' || needs.frontend.result == 'skipped' || needs.backend.result == 'skipped')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          
      - name: Generate image tag
        id: tag
        run: echo "tag=v1-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          
      - name: Update frontend image tag
        if: needs.frontend.result == 'success'
        run: |
          cd kubernetes-manifests
          kustomize edit set image blog-site-frontend=${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          
      - name: Update backend image tag
        if: needs.backend.result == 'success'
        run: |
          cd kubernetes-manifests
          kustomize edit set image blog-site-backend=${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes-manifests/kustomization.yaml
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🚀 Update image tags to ${{ steps.tag.outputs.tag }} [skip ci]"
            git push
          fi


# -------------------------------------------------
# 7. COST TRACKING & REPORTING
# -------------------------------------------------
  cost-tracking:
    runs-on: ubuntu-latest
    needs: [update-manifests]
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Calculate Docker Image Sizes
        run: |
          echo "## 💰 Cost Tracking Report" > cost-report.md
          echo "" >> cost-report.md
          echo "**Build Date:** $(date)" >> cost-report.md
          echo "**Commit:** ${GITHUB_SHA::7}" >> cost-report.md
          echo "" >> cost-report.md
          
          # Calculate image sizes (approximate)
          echo "### Docker Image Sizes" >> cost-report.md
          echo "" >> cost-report.md
          
          # Frontend size estimation
          FRONTEND_SIZE=$(docker manifest inspect ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:latest 2>/dev/null | grep -o '"size":[0-9]*' | head -1 | cut -d':' -f2 || echo "0")
          FRONTEND_MB=$((FRONTEND_SIZE / 1024 / 1024))
          echo "- **Frontend Image:** ${FRONTEND_MB} MB" >> cost-report.md
          
          # Backend size estimation
          BACKEND_SIZE=$(docker manifest inspect ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:latest 2>/dev/null | grep -o '"size":[0-9]*' | head -1 | cut -d':' -f2 || echo "0")
          BACKEND_MB=$((BACKEND_SIZE / 1024 / 1024))
          echo "- **Backend Image:** ${BACKEND_MB} MB" >> cost-report.md
          
          echo "" >> cost-report.md
          
      - name: Calculate Pipeline Cost
        run: |
          echo "### Pipeline Execution Cost" >> cost-report.md
          echo "" >> cost-report.md
          
          # GitHub Actions pricing: $0.008 per minute for Linux runners
          ESTIMATED_MINUTES=12
          COST_PER_MINUTE=0.008
          PIPELINE_COST=$(echo "$ESTIMATED_MINUTES * $COST_PER_MINUTE" | bc -l)
          
          echo "- **Estimated Pipeline Duration:** ~${ESTIMATED_MINUTES} minutes" >> cost-report.md
          echo "- **Pipeline Cost:** \$${PIPELINE_COST}" >> cost-report.md
          echo "" >> cost-report.md
          
      - name: Estimate Infrastructure Cost
        run: |
          echo "### Monthly Infrastructure Cost Estimate" >> cost-report.md
          echo "" >> cost-report.md
          echo "| Resource | Quantity | Unit Cost | Monthly Cost |" >> cost-report.md
          echo "|----------|----------|-----------|--------------|" >> cost-report.md
          echo "| EKS Control Plane | 1 | \$73/month | \$73 |" >> cost-report.md
          echo "| EC2 t3.medium | 3 nodes | \$30/month | \$90 |" >> cost-report.md
          echo "| EBS gp3 (10GB) | 2 volumes | \$0.50/month | \$1 |" >> cost-report.md
          echo "| ALB | 1 | \$18/month | \$18 |" >> cost-report.md
          echo "| Data Transfer | Variable | ~\$5/month | \$5 |" >> cost-report.md
          echo "| **Total** | | | **~\$187/month** |" >> cost-report.md
          echo "" >> cost-report.md
          
          echo "### Cost Optimization Recommendations" >> cost-report.md
          echo "" >> cost-report.md
          echo "- ✅ Using HPA for auto-scaling (saves ~\$30/month)" >> cost-report.md
          echo "- ✅ Using gp3 instead of gp2 (saves ~\$0.20/month)" >> cost-report.md
          echo "- ✅ Resource limits prevent over-provisioning" >> cost-report.md
          echo "- 💡 Consider Spot instances for non-prod (save ~40%)" >> cost-report.md
          echo "- 💡 Use Cluster Autoscaler to scale nodes (save ~\$30/month)" >> cost-report.md
          echo "" >> cost-report.md
          
      - name: Upload Cost Report
        uses: actions/upload-artifact@v4
        with:
          name: cost-report
          path: cost-report.md
          retention-days: 90
          
      - name: Comment Cost Report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('cost-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
