name: CICD Pipeline

on:
  push:
    branches: ["main"]

env:
  FRONTEND_IMAGE_NAME: blog-site-frontend
  BACKEND_IMAGE_NAME: blog-site-backend

jobs:

  security-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trivy Installation
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Trivy FS Scan
        # FIX 1: format and file extension now both match (json)
        run: trivy fs --format json -o fs-report.json .

      - name: Gitleaks Installation
        run: sudo apt install gitleaks -y

      - name: Gitleaks Code Scan
        run: gitleaks detect --source . -v


  build_project_and_sonar:
    runs-on: ubuntu-latest
    needs: security-check

    steps:
      - uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        # FIX 2: pinned to a specific stable version instead of @master
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}


  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    # FIX 6: changes detection no longer waits on sonar — only needs security-check
    needs: security-check

    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - uses: actions/checkout@v4

      - name: Check for frontend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'server/**'


  frontend:
    name: Frontend — Build & Push
    runs-on: ubuntu-latest
    # FIX 6 (cont): also wait for sonar to pass before building images
    needs: [changes, build_project_and_sonar]
    if: needs.changes.outputs.frontend == 'true'

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get latest image tag
        id: get_tag
        run: |
          # FIX 3: authenticated Docker Hub API call to avoid rate limiting
          TOKEN=$(curl -s -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d '{"username": "${{ secrets.DOCKER_USERNAME }}", "password": "${{ secrets.DOCKER_TOKEN }}"}' \
            | jq -r '.token')

          LATEST=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}/tags/?ordering=last_updated" \
            | jq -r '.results[].name' | grep -E '^v[0-9]+$' | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            NEXT_TAG="v1"
          else
            VERSION=${LATEST#v}
            NEXT_TAG="v$((VERSION + 1))"
          fi

          # FIX 4: append short SHA to version tag to prevent race condition on concurrent runs
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "next_tag=${NEXT_TAG}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          # FIX 5: also push a `latest` tag alongside the versioned tag
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.get_tag.outputs.next_tag }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:latest


  backend:
    name: Backend — Build & Push
    runs-on: ubuntu-latest
    # FIX 6 (cont): also wait for sonar to pass before building images
    needs: [changes, build_project_and_sonar]
    if: needs.changes.outputs.backend == 'true'

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get latest image tag
        id: get_tag
        run: |
          # FIX 3: authenticated Docker Hub API call to avoid rate limiting
          TOKEN=$(curl -s -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d '{"username": "${{ secrets.DOCKER_USERNAME }}", "password": "${{ secrets.DOCKER_TOKEN }}"}' \
            | jq -r '.token')

          LATEST=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}/tags/?ordering=last_updated" \
            | jq -r '.results[].name' | grep -E '^v[0-9]+$' | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            NEXT_TAG="v1"
          else
            VERSION=${LATEST#v}
            NEXT_TAG="v$((VERSION + 1))"
          fi

          # FIX 4: append short SHA to version tag to prevent race condition on concurrent runs
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "next_tag=${NEXT_TAG}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          # FIX 5: also push a `latest` tag alongside the versioned tag
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.get_tag.outputs.next_tag }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:latest
