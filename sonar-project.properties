sonar.projectKey=blog-site
sonar.projectName=blog-site
sonar.projectVersion=1.0

# Source directories
sonar.sources=frontend/src,server
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/*.test.js,**/*.spec.js

# Language-specific settings
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info

# Test directories
sonar.tests=frontend/src
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Encoding
sonar.sourceEncoding=UTF-8
